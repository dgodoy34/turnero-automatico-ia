[build]
  command = "npm run build"
  publish = ".next"


[[plugins]]
package = "@netlify/plugin-nextjs"

[[redirects]]
from = "/*"
to = "/.netlify/functions/___netlify-server-handler"
status = 200

[functions]
  directory = "netlify/functions"

[functions.send-reminders]
  schedule = "*/5 * * * *"

  [functions.auto-cancel]
  schedule = "*/5 * * * *"

  [functions."birthdays"]
schedule = "0 12 * * *" # una vez al día

[[schedule]]
  path = "/api/cron/birthdays"
  schedule = "30 13 * * *"